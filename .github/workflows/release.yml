name: Release

# Publishes dfhack-mcp to npm and cuts a GitHub Release when a version tag is
# pushed. The tarball ships a PREBUILT bundle (dist/ from `npm run build`, copied
# .lua queries included), so end users install with `npx -y dfhack-mcp` — no build
# on their side. Cut a release by bumping package.json + CHANGELOG, then:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Requires an `NPM_TOKEN` repository secret (an npm automation/publish token for
# the account that owns the `dfhack-mcp` name). id-token:write enables npm
# provenance so the published package is linked to this workflow run.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      # The same gate CI runs — a broken build never reaches the registry. The
      # `prepublishOnly` script re-runs it on publish too; this surfaces failures
      # before the publish step for a clearer log.
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Verify T0 (contract)
        run: npm run verify:t0

      # Guard: the tag must match the package.json version (tag v1.0.0 -> 1.0.0),
      # so a mis-tagged push can't publish the wrong version.
      - name: Check tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($TAG) != package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
