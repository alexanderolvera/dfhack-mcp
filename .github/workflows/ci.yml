name: CI

# CI validates typecheck + lint + build + the T0 contract tier (verify.mjs
# --tier=0: server starts, tools/list matches the set derived from
# src/tools/registry.ts, every schema is well-formed -- no DF needed).
# Reachability/golden tiers (T1/T2)
# require a live Dwarf Fortress + DFHack, which cannot run in CI, so they stay
# local for now (npm run verify:t1) -- see CONTRIBUTING.md. Live CI is #28 Phase 3.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # The dfhack-remote-node client is a published npm package (ships prebuilt),
      # so a plain install pulls it -- no sibling checkout/build needed.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # T0 contract tier: spawns the server over real MCP stdio and asserts the
      # handshake, the tools/list == expected set, and well-formed schemas. Needs
      # no DFHack, so it runs here and catches registration/schema regressions.
      - name: Verify T0 (contract)
        run: npm run verify:t0

      # Unit tests: the §A0 actuator protocol (dry-run/confirm/apply/undo, token
      # invalidation). Pure logic, no DFHack, so it belongs in CI.
      - name: Unit tests
        run: npm run test:unit
